<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Średniowieczna Piekarnia z Piekarzem VR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene environment="preset: default; groundColor: #4a3121; grid: none">
      
      <a-assets>
        <img id="stone-wall" src="https://cdn.glitch.global/f19f6a6b-c564-4e2b-b6d4-d577e3c15332/stone_wall.jpg?v=1713430000000" crossorigin="anonymous">
        <img id="wood-floor" src="https://cdn.glitch.global/f19f6a6b-c564-4e2b-b6d4-d577e3c15332/wood_floor.jpg?v=1713430000000" crossorigin="anonymous">
        <img id="brick-oven" src="https://cdn.glitch.global/f19f6a6b-c564-4e2b-b6d4-d577e3c15332/brick_oven.jpg?v=1713430000000" crossorigin="anonymous">
      </a-assets>

      <a-plane position="0 0.01 0" rotation="-90 0 0" width="10" height="10" src="#wood-floor" repeat="4 4"></a-plane>
      <a-box position="0 2.5 -5" width="10" height="5" depth="0.5" src="#stone-wall" repeat="2 1"></a-box>
      <a-box position="-5 2.5 0" rotation="0 90 0" width="10" height="5" depth="0.5" src="#stone-wall" repeat="2 1"></a-box>
      <a-box position="5 2.5 0" rotation="0 -90 0" width="10" height="5" depth="0.5" src="#stone-wall" repeat="2 1"></a-box>
      <a-plane position="0 5 0" rotation="90 0 0" width="10" height="10" color="#3d2819"></a-plane>

      <a-entity position="0 0 -4.5">
        <a-box position="0 1.25 0" width="3" height="2.5" depth="1.5" src="#brick-oven"></a-box>
        <a-light type="point" color="#ff6600" intensity="1.5" distance="3" position="0 1.1 0.5">
            <a-animation attribute="intensity" from="1.5" to="1.8" dur="500" repeat="indefinite" direction="alternate"></a-animation>
        </a-light>
      </a-entity>

      <a-entity id="baker" position="1.5 0 -3.5" rotation="0 -30 0">
        <a-cylinder position="-0.15 0.4 0" radius="0.1" height="0.8" color="#3e2723"></a-cylinder>
        <a-cylinder position="0.15 0.4 0" radius="0.1" height="0.8" color="#3e2723"></a-cylinder>
        <a-box position="0 1.2 0" width="0.6" height="0.8" depth="0.4" color="#5d4037"></a-box>
        <a-box position="0 1.15 0.21" width="0.45" height="0.7" depth="0.02" color="#f5f5f5"></a-box>
        <a-sphere position="0 1.8 0" radius="0.25" color="#ffdbac"></a-sphere>
        <a-cylinder position="0 2.1 0" radius="0.2" height="0.2" color="#ffffff"></a-cylinder>
        <a-cylinder position="-0.4 1.3 0" rotation="0 0 20" radius="0.07" height="0.7" color="#5d4037"></a-cylinder>
        <a-cylinder position="0.4 1.3 0.2" rotation="-40 0 -20" radius="0.07" height="0.7" color="#5d4037"></a-cylinder>
        <a-entity position="0.6 1.0 0.4" rotation="90 0 0">
            <a-cylinder radius="0.03" height="2" color="#8b4513"></a-cylinder> <a-box position="0 1 0" width="0.4" height="0.5" depth="0.05" color="#cd853f"></a-box> </a-entity>
      </a-entity>

      <a-box position="-3 0.5 -2.5" width="2.5" height="1" depth="0.8" color="#5c4033"></a-box>
      <a-sphere position="-2.7 1.05 -2.5" radius="0.15" color="#d2b48c" scale="1.5 0.8 1"></a-sphere>

      <a-entity light="type: ambient; color: #BBB; intensity: 0.4"></a-entity>
      <a-entity light="type: point; intensity: 0.8; distance: 5; color: #ffcc99" position="0 3 -1"></a-entity>

      <a-entity id="rig" movement-controls="speed: 0.1">
        <a-entity camera position="0 1.6 0" look-controls></a-entity>
        <a-entity oculus-touch-controls="hand: left"></a-entity>
        <a-entity oculus-touch-controls="hand: right"></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
